<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Set New Password — Bookshelf Library</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .auth-container { max-width: 420px; margin: 80px auto; padding: 40px 30px; background: linear-gradient(160deg, #2a2218, #1e1812); border: 1px solid rgba(139,90,43,0.25); border-radius: 18px; box-shadow: 0 30px 60px rgba(0,0,0,0.6); }
    .auth-container h1 { text-align: center; color: #f0e6d6; margin-bottom: 8px; font-size: 1.6rem; }
    .auth-container .subtitle { text-align: center; color: #a08870; margin-bottom: 28px; font-size: 0.9rem; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; color: #a08870; font-size: 0.8rem; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 1px; }
    .form-group input { width: 100%; padding: 12px 16px; border-radius: 10px; border: 1px solid rgba(139,90,43,0.25); background: rgba(20,16,12,0.7); color: #e8e0d4; font-size: 0.95rem; outline: none; transition: border-color 0.3s; }
    .form-group input:focus { border-color: #c8956c; box-shadow: 0 0 12px rgba(200,149,108,0.2); }
    .btn-submit { width: 100%; padding: 14px; border: none; border-radius: 12px; background: linear-gradient(135deg, #c8956c, #a06830); color: #fff; font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.25s; margin-top: 8px; }
    .btn-submit:hover { background: linear-gradient(135deg, #d4a574, #b87840); transform: translateY(-1px); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
    .auth-link { text-align: center; margin-top: 20px; color: #7a6a5a; font-size: 0.85rem; }
    .auth-link a { color: #c8956c; text-decoration: none; }
    .error-msg { background: rgba(220,50,50,0.15); border: 1px solid rgba(220,50,50,0.3); color: #ff8a80; padding: 10px 14px; border-radius: 10px; font-size: 0.85rem; margin-bottom: 16px; display: none; }
    .success-msg { background: rgba(76,175,80,0.15); border: 1px solid rgba(76,175,80,0.3); color: #81c784; padding: 10px 14px; border-radius: 10px; font-size: 0.85rem; margin-bottom: 16px; display: none; }
    .back-home { display: inline-block; margin-bottom: 20px; color: #a08870; text-decoration: none; font-size: 0.85rem; }
  </style>
</head>
<body>
  <div class="auth-container">
    <a href="/" class="back-home">← Back to Library</a>
    <h1>🔐 Set New Password</h1>
    <p class="subtitle">Enter your new password</p>
    <div id="errorMsg" class="error-msg"></div>
    <div id="successMsg" class="success-msg"></div>
    <form id="resetForm">
      <div class="form-group"><label>New Password</label><input type="password" id="password" required minlength="8" placeholder="Minimum 8 characters"></div>
      <div class="form-group"><label>Confirm Password</label><input type="password" id="confirmPassword" required placeholder="Repeat your password"></div>
      <button type="submit" class="btn-submit" id="submitBtn">Reset Password</button>
    </form>
    <p class="auth-link"><a href="/login.html">Back to Login</a></p>
  </div>
  <script>
    const token = new URLSearchParams(window.location.search).get('token');
    if (!token) { document.getElementById('errorMsg').textContent = 'Invalid or missing reset token.'; document.getElementById('errorMsg').style.display = 'block'; document.getElementById('submitBtn').disabled = true; }
    const form = document.getElementById('resetForm');
    const errorMsg = document.getElementById('errorMsg');
    const successMsg = document.getElementById('successMsg');
    const submitBtn = document.getElementById('submitBtn');
    function showError(msg) { errorMsg.textContent = msg; errorMsg.style.display = 'block'; successMsg.style.display = 'none'; }
    function showSuccess(msg) { successMsg.textContent = msg; successMsg.style.display = 'block'; errorMsg.style.display = 'none'; }
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.style.display = 'none'; successMsg.style.display = 'none';
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      if (password.length < 8) return showError('Password must be at least 8 characters.');
      if (password !== confirmPassword) return showError('Passwords do not match.');
      submitBtn.disabled = true; submitBtn.textContent = 'Resetting...';
      try {
        const res = await fetch('/api/auth/confirm-reset', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token, password }) });
        const data = await res.json();
        if (res.ok) { showSuccess('Password reset! Redirecting to login...'); setTimeout(() => window.location.href = '/login.html', 2000); }
        else { showError(data.message || 'Failed to reset password.'); }
      } catch (err) { showError('Network error. Please try again.'); }
      finally { submitBtn.disabled = false; submitBtn.textContent = 'Reset Password'; }
    });
  </script>
</body>
</html>
