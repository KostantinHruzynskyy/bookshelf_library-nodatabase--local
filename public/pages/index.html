<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home - Bookshelf Library</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="navbar">
<a href="/" class="navbar-brand"><span class="icon">📚</span> Bookshelf</a>
<ul class="navbar-nav">
<li><a href="/" class="active">🏠 Home</a></li>
<li><a href="/books.html">📖 Books</a></li>
<li><a href="/bookmarks.html">🔖 Bookmarks</a></li>
<li><a href="/wishlist.html">⭐ Wishlist</a></li>
<li><a href="/tags.html">🏷️ Tags</a></li>
<li><a href="/analytics.html">📊 Analytics</a></li>
</ul>
<div class="navbar-right">
<span id="authLinks"><a href="/login.html" class="btn btn-login">Login</a> <a href="/register.html" class="btn btn-register">Register</a></span>
<span id="userLinks" class="user-menu" style="display:none"><a href="/profile.html" id="userName" class="user-name"></a> <button id="logoutBtn" class="btn btn-logout">Logout</button></span>
</div>
</nav>

<main>
<div class="page-header"><h1>📚 All Books</h1><p>Discover our digital library</p></div>
<div class="search-container"><input id="searchInput" type="text" placeholder="Search books..."><button id="searchBtn">🔍 Search</button></div>
<div id="booksGrid" class="books-grid"></div>
</main>

<footer class="footer">
<div class="footer-content">
<div class="footer-brand">📚 Bookshelf Library</div>
<div class="footer-copyright">© 2026 Bookshelf Library. All rights reserved. (Skyy)</div>
</div>
</footer>

<script>
// Load books directly
fetch('/api/books')
  .then(function(r) { return r.json(); })
  .then(function(books) {
    var grid = document.getElementById('booksGrid');
    if (!books || books.length === 0) {
      grid.innerHTML = '<div class="empty-state"><div class="icon">📚</div><h2>No books yet</h2></div>';
      return;
    }
    var html = '';
    for (var i = 0; i < books.length; i++) {
      var b = books[i];
      html += '<div class="book-card">';
      html += '<div class="book-cover" style="background:' + (b.color || '#5d4037') + '">';
      html += '<span class="format-icon">' + (b.formatIcon || '📚') + '</span>';
      html += '<span class="format-badge">' + (b.formatLabel || b.format || 'Book') + '</span>';
      html += '</div>';
      html += '<div class="book-info">';
      html += '<h3>' + b.title + '</h3>';
      html += '<p class="author">' + (b.author || 'Unknown') + '</p>';
      html += '</div>';
      html += '<div class="book-actions">';
      html += '<button class="btn-read" onclick="window.location.href=\'/reader.html?id=' + b.id + '\'">📖 Read</button>';
      html += '<button class="btn-download" onclick="window.location.href=\'/api/books/' + b.id + '/file\'">⬇️ Download</button>';
      html += '</div>';
      html += '</div>';
    }
    grid.innerHTML = html;
  })
  .catch(function(e) { console.error('Error:', e); });
</script>

</body>
</html>
