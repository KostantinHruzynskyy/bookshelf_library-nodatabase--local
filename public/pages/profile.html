<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Profile - Bookshelf Library</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .ac{max-width:520px;margin:40px auto;padding:36px 30px;background:linear-gradient(160deg,#2a2218,#1e1812);border:1px solid rgba(139,90,43,.25);border-radius:18px;box-shadow:0 30px 60px rgba(0,0,0,.6)}
    .ac h1{color:#f0e6d6;margin-bottom:8px;font-size:1.5rem}
    .fg{margin-bottom:16px}.fg label{display:block;color:#a08870;font-size:.8rem;margin-bottom:4px;text-transform:uppercase;letter-spacing:1px}
    .fg input,.fg select{width:100%;padding:12px 16px;border-radius:10px;border:1px solid rgba(139,90,43,.25);background:rgba(20,16,12,.7);color:#e8e0d4;font-size:.95rem;outline:none}
    .fg input:focus{border-color:#c8956c}
    .bs{width:100%;padding:14px;border:none;border-radius:12px;background:linear-gradient(135deg,#c8956c,#a06830);color:#fff;font-size:1rem;font-weight:700;cursor:pointer;margin-top:8px}
    .bs:hover{background:linear-gradient(135deg,#d4a574,#b87840)}.bs:disabled{opacity:.5;cursor:not-allowed}
    .sd{border:none;border-top:1px solid rgba(139,90,43,.15);margin:28px 0}
    .st{color:#c8956c;font-size:1.1rem;margin-bottom:16px}
    .em{background:rgba(220,50,50,.15);border:1px solid rgba(220,50,50,.3);color:#ff8a80;padding:10px 14px;border-radius:10px;font-size:.85rem;margin-bottom:16px;display:none}
    .sm{background:rgba(76,175,80,.15);border:1px solid rgba(76,175,80,.3);color:#81c784;padding:10px 14px;border-radius:10px;font-size:.85rem;margin-bottom:16px;display:none}
    .bl{display:inline-block;margin-bottom:20px;color:#a08870;text-decoration:none;font-size:.85rem}
  </style>
</head>
<body>
  <div class="ac">
    <a href="/dashboard.html" class="bl">← Dashboard</a>
    <h1>👤 Edit Profile</h1>
    <div id="eM" class="em"></div>
    <div id="sM" class="sm"></div>
    <form id="pF">
      <div class="fg"><label>Username</label><input type="text" id="un" minlength="3" maxlength="30" required></div>
      <div class="fg"><label>Email</label><input type="email" id="em" disabled></div>
      <div class="fg"><label>Language</label><select id="lg"><option value="en">English</option><option value="it">Italiano</option><option value="fr">Français</option><option value="es">Español</option><option value="de">Deutsch</option></select></div>
      <button type="submit" class="bs" id="pB">Save Profile</button>
    </form>
    <hr class="sd">
    <h2 class="st">🔐 Change Password</h2>
    <form id="pwF">
      <div class="fg"><label>Current Password</label><input type="password" id="cp" required></div>
      <div class="fg"><label>New Password</label><input type="password" id="np" required minlength="8"></div>
      <div class="fg"><label>Confirm</label><input type="password" id="cnp" required></div>
      <button type="submit" class="bs" id="pwB">Change Password</button>
    </form>
    <hr class="sd">
    <h2 class="st">📧 Change Email</h2>
    <form id="eF">
      <div class="fg"><label>New Email</label><input type="email" id="ne" required></div>
      <div class="fg"><label>Password</label><input type="password" id="epw" required></div>
      <button type="submit" class="bs" id="eB">Change Email</button>
    </form>
  </div>
  <script>
    const eM=document.getElementById('eM'),sM=document.getElementById('sM');
    function sE(m){eM.textContent=m;eM.style.display='block';sM.style.display='none'}
    function sS(m){sM.textContent=m;sM.style.display='block';eM.style.display='none'}
    function hM(){eM.style.display='none';sM.style.display='none'}
    async function lP(){try{const r=await fetch('/api/auth/me');if(!r.ok){window.location.href='/login.html';return}const d=await r.json();document.getElementById('un').value=d.user.username;document.getElementById('em').value=d.user.email;document.getElementById('lg').value=d.user.preferred_language||'en'}catch(e){sE('Failed to load profile.')}}
    document.getElementById('pF').addEventListener('submit',async(e)=>{e.preventDefault();hM();const b=document.getElementById('pB');b.disabled=true;try{const r=await fetch('/api/user/profile',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:document.getElementById('un').value.trim(),preferred_language:document.getElementById('lg').value})});const d=await r.json();r.ok?sS('Profile updated!'):sE(d.message||'Failed.')}catch(e){sE('Network error.')}finally{b.disabled=false}});
    document.getElementById('pwF').addEventListener('submit',async(e)=>{e.preventDefault();hM();const pw=document.getElementById('np').value,cw=document.getElementById('cnp').value;if(pw!==cw)return sE('Passwords do not match.');const b=document.getElementById('pwB');b.disabled=true;try{const r=await fetch('/api/user/change-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({currentPassword:document.getElementById('cp').value,newPassword:pw})});const d=await r.json();if(r.ok){sS('Password changed!');document.getElementById('pwF').reset()}else sE(d.message||'Failed.')}catch(e){sE('Network error.')}finally{b.disabled=false}});
    document.getElementById('eF').addEventListener('submit',async(e)=>{e.preventDefault();hM();const b=document.getElementById('eB');b.disabled=true;try{const r=await fetch('/api/user/change-email',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:document.getElementById('ne').value.trim(),password:document.getElementById('epw').value})});const d=await r.json();r.ok?sS(d.message):sE(d.message||'Failed.')}catch(e){sE('Network error.')}finally{b.disabled=false}});
    lP();
  </script>
</body>
</html>
