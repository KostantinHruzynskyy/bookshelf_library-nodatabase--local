<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reader — Bookshelf Library</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Georgia', 'Times New Roman', serif;
      background: #1a1410;
      color: #d4c5b0;
      min-height: 100vh;
    }

    /* ---- TOP BAR ---- */
    .reader-topbar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 24px;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 50;
      border-bottom: 1px solid rgba(139,90,43,0.15);
    }

    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 10px;
      border: 1px solid rgba(139,90,43,0.35);
      background: rgba(139,90,43,0.12);
      color: #d4a574;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 600;
      font-family: 'Segoe UI', system-ui, sans-serif;
      cursor: pointer;
      transition: all 0.25s;
    }

    .btn-back:hover {
      background: rgba(139,90,43,0.25);
      color: #f0d0a0;
    }

    .reader-topbar .book-title-header {
      font-size: 1rem;
      color: #c8956c;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ---- CONTENT ---- */
    .reader-content {
      max-width: 720px;
      margin: 0 auto;
      padding: 50px 28px 80px;
    }

    .reader-content h1 {
      font-size: 2rem;
      color: #f0e6d6;
      margin-bottom: 8px;
      line-height: 1.3;
    }

    .reader-content .divider {
      width: 80px;
      height: 3px;
      background: linear-gradient(90deg, #c8956c, transparent);
      margin: 20px 0 30px;
      border-radius: 2px;
    }

    .reader-content .book-text {
      font-size: 1.12rem;
      line-height: 1.85;
      color: #c8baa8;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    /* ---- LOADING ---- */
    .loading {
      text-align: center;
      padding: 100px 20px;
      color: #7a6a5a;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    .loading .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(139,90,43,0.2);
      border-top-color: #c8956c;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ---- ERROR ---- */
    .error-msg {
      text-align: center;
      padding: 80px 20px;
      color: #ef9a9a;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    .error-msg .icon { font-size: 3rem; margin-bottom: 12px; }

    /* ---- RESPONSIVE ---- */
    @media (max-width: 600px) {
      .reader-content { padding: 30px 18px 60px; }
      .reader-content h1 { font-size: 1.5rem; }
      .reader-content .book-text { font-size: 1rem; }
    }
  </style>
</head>
<body>

<div class="reader-topbar">
  <a href="/" class="btn-back">← Back to Library</a>
  <span class="book-title-header" id="headerTitle">Loading...</span>
</div>

<div class="reader-content" id="readerContent">
  <div class="loading">
    <div class="spinner"></div>
    <p>Loading book...</p>
  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const title = params.get('title') || 'Unknown Book';
const file = params.get('file');

document.getElementById('headerTitle').textContent = title;

if (file) {
  fetch(file)
    .then(r => {
      if (!r.ok) throw new Error('Book not found');
      return r.text();
    })
    .then(text => {
      document.getElementById('readerContent').innerHTML = `
        <h1>${esc(title)}</h1>
        <div class="divider"></div>
        <div class="book-text">${esc(text)}</div>
      `;
    })
    .catch(() => {
      document.getElementById('readerContent').innerHTML = `
        <div class="error-msg">
          <div class="icon">📖</div>
          <h2>Could not load book</h2>
          <p>The book file could not be found. It may have been deleted.</p>
        </div>
      `;
    });
} else {
  document.getElementById('readerContent').innerHTML = `
    <div class="error-msg">
      <div class="icon">❓</div>
      <h2>No book specified</h2>
      <p>Go back to the library and select a book to read.</p>
    </div>
  `;
}

function esc(str) {
  const d = document.createElement('div');
  d.textContent = str || '';
  return d.innerHTML;
}
</script>

</body>
</html>
