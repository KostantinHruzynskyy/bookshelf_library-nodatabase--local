<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Reader</title>

<style>
body {
  margin: 0;
  padding: 40px;
  font-family: serif;
  background: #111;
  color: white;
  line-height: 1.6;
}

pre {
  white-space: pre-wrap;
}
</style>
</head>

<body>

<h1 id="title"></h1>
<pre id="content"></pre>

<script>
const params = new URLSearchParams(window.location.search);

document.getElementById("title").textContent =
  params.get("title");

fetch(params.get("file"))
  .then(r => r.text())
  .then(t => {
    document.getElementById("content").textContent = t;
  });
</script>

</body>
</html>
