name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - name: Check syntax
        run: |
          find . -name "*.js" -not -path "*/node_modules/*" -not -path "*/.git/*" | head -50 | while read f; do
            node -c "$f" || echo "Syntax error in $f"
          done

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - name: Start server
        run: |
          npm start &
          sleep 5
      - name: Run tests
        run: node tests/test-all.js
      - name: Stop server
        if: always()
        run: pkill -f "node server.js" || true

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - name: NPM audit
        run: npm audit --audit-level=high || true
      - name: Check for known vulnerabilities
        run: npx npm-check --skip-unused || true

  build:
    name: Build & Package
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci --production
      - name: Create artifact
        run: |
          mkdir -p dist
          cp -r server.js package.json package-lock.json books.json public src security docs dist/
          cp -r .env.example .gitignore dist/ 2>/dev/null || true
      - uses: actions/upload-artifact@v4
        with:
          name: bookshelf-library
          path: dist/

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy notification
        run: echo "🚀 Deploy triggered for ${{ github.sha }}"

  line-endings:
    name: Check Line Endings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for CRLF
        run: |
          crlf_files=$(find . -name "*.js" -not -path "*/node_modules/*" -not -path "*/.git/*" -exec file {} \; | grep CRLF || true)
          if [ -n "$crlf_files" ]; then
            echo "⚠️ Files with CRLF line endings found:"
            echo "$crlf_files"
            echo "Run: find . -name '*.js' -not -path '*/node_modules/*' -exec sed -i 's/\\r$//' {} +"
            exit 1
          fi
          echo "✅ No CRLF line endings found"
